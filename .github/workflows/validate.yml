name: Validate content

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate course data
        run: npm run validate

      - name: Check app syntax
        run: node --check app.js

      - name: Check scripts syntax
        run: |
          node --check scripts/validate-content.mjs
          node --check scripts/create-topic-draft.mjs
